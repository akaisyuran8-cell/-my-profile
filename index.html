<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自己紹介サイト</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">

  <header class="fade-section">
    <h1>aisi</h1>
    <p>プログラミング学習中のクリエイター</p>
  </header>

  <section class="profile fade-section">
    <img src="images/profile.png" alt="プロフィール画像" class="profile-img" />
    <p>HTML / CSS / JavaScript を勉強中。  
    Twitter風アプリを作ったり、デザインの練習をしています。</p>
  </section>

  <section class="skills fade-section">
    <h2>スキル</h2>
    <ul>
      <li>HTML / CSS</li>
      <li>JavaScript</li>
      <li>React / Next.js（練習中）</li>
      <li>GitHub</li>
    </ul>
  </section>

  <section class="works fade-section">
    <h2>作品</h2>
<ul>
  <li>
    <a href="https://next-twitter-gamma.vercel.app" target="_blank">
      next-twitter（Twitter風アプリ）
    </a>
  </li>
</ul>

  </section>

  <footer class="fade-section">
    <p>© 2026 aisi</p>
  </footer>

  </div>
<script>
  window.addEventListener("load", () => {
    const sections = document.querySelectorAll(".fade-section");
    sections.forEach((sec, i) => {
      setTimeout(() => {
        sec.classList.add("show");
      }, i * 300);
    });
  });
</script>

</body>
</html>
